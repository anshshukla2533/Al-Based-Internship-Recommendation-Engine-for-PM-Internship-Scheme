<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM INTERN | Empowering Youth</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN for standalone file) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: '#FF5500',
                    },
                    fontFamily: {
                        pixel: ['"Press Start 2P"', 'cursive'],
                        sans: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* Base Resets & Animations */
        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* Subtle floating animation for the text */
        .float-subtle {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        /* Button glow effect */
        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.4);
        }
        
        /* Pixel Font Anti-aliasing tweak */
        .font-pixel {
            -webkit-font-smoothing: none;
        }
    </style>
</head>
<body class="font-sans min-h-screen relative selection:bg-neon selection:text-black">

    <!-- Background Video -->
    <!-- Note: Used a high-quality abstract tech video. Replace src if your github link provides a direct raw .mp4 -->
    <video 
        autoplay 
        loop 
        muted 
        playsinline
        class="fixed top-0 left-0 w-full h-full object-cover z-0 opacity-80"
    >
        <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-technology-connection-background-3094-large.mp4" type="video/mp4">
    </video>

    <!-- Dark Overlay for Contrast -->
    <div class="fixed top-0 left-0 w-full h-full bg-black/60 z-10 pointer-events-none mix-blend-multiply"></div>
    <div class="fixed top-0 left-0 w-full h-full bg-gradient-to-r from-black/20 to-black/90 z-10 pointer-events-none"></div>

    <!-- Main Content Wrapper -->
    <div class="relative z-20 min-h-screen flex flex-col justify-between px-6 py-8 md:px-12 md:py-10">

        <!-- Header -->
        <header class="flex justify-between items-center w-full">
            <div class="font-pixel tracking-widest text-lg md:text-xl text-white drop-shadow-lg">
                PM <span class="text-neon">INTERN</span>
            </div>
            <button class="border border-white/50 text-white font-medium text-sm tracking-[0.2em] uppercase px-8 py-3 hover:bg-white hover:text-black transition-all duration-300">
                MENU
            </button>
        </header>

        <!-- Center Stage -->
        <main class="flex-grow grid grid-cols-1 lg:grid-cols-2 gap-10 items-center mt-12 mb-12 relative w-full pr-0 lg:pr-24">
            
            <!-- Left Column: Empty to show glowing background block -->
            <div class="hidden lg:block w-full h-full">
                <!-- Intentionally left transparent -->
            </div>

            <!-- Right Column: Content -->
            <div class="flex flex-col gap-6 lg:gap-8 max-w-2xl float-subtle">
                <p class="text-neon font-bold tracking-[0.3em] text-xs md:text-sm uppercase flex items-center gap-4">
                    <span class="w-12 h-px bg-neon inline-block"></span>
                    GOVERNMENT OF INDIA
                </p>
                
                <!-- Huge Pixel Headline -->
                <h1 class="font-pixel text-3xl sm:text-4xl md:text-5xl lg:text-5xl leading-[1.3] text-white drop-shadow-2xl">
                    EMPOWERING <br/>YOUTH <br/><span class="text-neon">CAREERS</span>
                </h1>
                
                <p class="text-gray-300 text-base md:text-lg lg:text-xl leading-relaxed font-light mt-2 max-w-lg border-l-2 border-white/20 pl-6">
                    The PM Internship Scheme connects ambitious youth from across the nation with top 500 CSR companies. Discover roles tailored to your unique skills.
                </p>
                
                <div class="flex flex-col sm:flex-row gap-4 mt-6">
                    <button class="bg-neon text-black border-2 border-neon font-bold text-sm tracking-widest uppercase px-8 py-4 hover:bg-transparent hover:text-neon transition-all duration-300 btn-glow">
                        FIND INTERNSHIPS
                    </button>
                    <button class="bg-transparent text-white border-2 border-white/30 font-bold text-sm tracking-widest uppercase px-8 py-4 hover:border-white transition-all duration-300 backdrop-blur-sm">
                        UPLOAD RESUME
                    </button>
                </div>
            </div>
            
        </main>

        <!-- Fixed Vertical Pagination Menu -->
        <div class="fixed right-6 md:right-12 top-1/2 -translate-y-1/2 z-30 hidden xl:flex flex-col items-center gap-10 font-bold tracking-widest text-xs h-[400px]">
            <!-- Vertical Line Track -->
            <div class="absolute top-0 bottom-0 w-px bg-white/10 -z-10"></div>
            <!-- Active Orange Line Segment -->
            <div class="absolute top-[20%] h-[30%] w-px bg-neon -z-10 shadow-[0_0_10px_rgba(255,85,0,0.8)]"></div>

            <span class="text-white uppercase rotate-90 origin-center mb-6">Start</span>
            <div class="flex flex-col gap-8 text-center text-white/30">
                <span class="text-neon drop-shadow-[0_0_5px_rgba(255,85,0,0.5)]">01</span>
                <span class="hover:text-white transition-colors cursor-pointer">02</span>
                <span class="hover:text-white transition-colors cursor-pointer">03</span>
            </div>
        </div>

    </div>

</body>
</html>
